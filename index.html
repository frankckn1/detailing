<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>法蘭克精緻汽車美容 | 在地深耕的職人呵護</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-bg: #FDFBFB;
            --secondary-bg: #F4F1EA;
            --accent-gold: #C4A77D;
            --text-dark: #4A4A4A;
            --text-brown: #5D4037;
        }

        body {
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--primary-bg);
            color: var(--text-dark);
            line-height: 1.6;
        }

        /* Header Section */
        header {
            text-align: center;
            padding: 60px 20px;
            background: linear-gradient(rgba(253, 251, 251, 0.8), rgba(253, 251, 251, 0.8)), 
                        url('https://images.unsplash.com/photo-1520340356584-f9917d1eea6f?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
            background-position: center;
        }

        .logo {
            font-size: 1.2rem;
            color: var(--accent-gold);
            letter-spacing: 2px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        h1 {
            font-size: 2.5rem;
            color: var(--text-brown);
            margin: 10px 0;
        }

        .subtitle {
            font-size: 1.1rem;
            color: #888;
        }

        /* Services Section */
        .services {
            padding: 50px 20px;
            max-width: 1000px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
        }

        .service-card {
            background: #fff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            text-align: center;
            transition: transform 0.3s;
        }

        .service-card:hover {
            transform: translateY(-5px);
        }

        .service-card i {
            font-size: 2.5rem;
            color: var(--accent-gold);
            margin-bottom: 20px;
        }

        .service-card h3 {
            color: var(--text-brown);
            margin-bottom: 15px;
        }

        /* Booking Section */
        .booking-section {
            background-color: var(--secondary-bg);
            padding: 80px 20px;
            text-align: center;
        }

        .booking-container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 40px;
            border-radius: 20px;
            border: 2px solid var(--accent-gold);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .qr-placeholder {
            width: 200px;
            height: 200px;
            background-color: #eee;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 20px 0;
            border: 1px dashed #ccc;
            position: relative;
        }

        /* 這裡可以放入您的 LINE QR Code 圖片 */
        .qr-placeholder img {
            max-width: 100%;
            height: auto;
        }

        .btn-line {
            background-color: #06C755;
            color: white;
            padding: 12px 30px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            margin-top: 20px;
            display: inline-block;
        }

        footer {
            padding: 40px 20px;
            text-align: center;
            font-size: 0.9rem;
            color: #999;
        }

        hr {
            border: 0;
            border-top: 1px solid #eee;
            margin: 40px 0;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">FRANK'S AUTO DETAILING</div>
        <h1>給愛車一份家一般的溫暖</h1>
        <p class="subtitle">在地深耕 · 職人精神 · 預約制服務</p>
    </header>

    <section class="services">
        <div class="service-card">
            <i class="fas fa-hand-sparkles"></i>
            <h3>精緻護理</h3>
            <p>全車手工泡沫洗車、內裝基礎除塵、玻璃撥水處理，讓日常代步也很有質感。</p>
        </div>
        <div class="service-card">
            <i class="fas fa-car-side"></i>
            <h3>尊榮美研</h3>
            <p>採用頂級棕櫚蠟施作，深層去汙與皮革滋養，找回新車般的感動。</p>
        </div>
        <div class="service-card">
            <i class="fas fa-shield-alt"></i>
            <h3>極致全護</h3>
            <p>高分子奈米鍍膜與車漆還原，給愛車最堅實且溫柔的隱形護盾。</p>
        </div>
    </section>

    <section class="booking-section">
        <div class="booking-container">
            <h2 style="color: var(--text-brown);">美好時光，無需等待</h2>
            <p>立即掃描二維碼或點擊下方按鈕預約</p>
            
            <div class="qr-placeholder">
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=https://lin.ee/AgnWGzM" alt="預約QR Code">
            </div>

            <a href="https://lin.ee/AgnWGzM" class="btn-line">
                <i class="fab fa-line"></i> LINE 線上預約
            </a>
            
            <div style="margin-top: 30px; font-size: 0.9rem;">
                <p><i class="fas fa-map-marker-alt"></i> 店址：[您的詳細服務地址]</p>
                <p><i class="fas fa-clock"></i> 營業時間：09:00 - 19:00 (預約制)</p>
            </div>
        </div>
    </section>

    <footer>
        <p>© 2026 法蘭克精緻汽車美容. All Rights Reserved.</p>
    </footer>

</body>
</html>
